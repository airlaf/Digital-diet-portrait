<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Rewind clock">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121211" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
  </defs>
  <!-- Dial -->
  <circle cx="16" cy="16" r="14" fill="url(#bg)" stroke="#2a2926" stroke-width="1" />
  <circle cx="16" cy="16" r="11" fill="none" stroke="#6f6c66" stroke-width="1.15" />
  <!-- Hour ticks -->
  <path
    d="M16 5.5v2M16 24.5v2M5.5 16h2M24.5 16h2"
    stroke="#9a9690"
    stroke-width="1.25"
    stroke-linecap="round"
  />
  <!-- Clock hands -->
  <path
    d="M16 16L16 9.5M16 16L21.5 18.5"
    stroke="#e8e6e3"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="16" cy="16" r="1.35" fill="#e8e6e3" />
  <!-- Rewind: counter-clockwise arc + arrowhead -->
  <path
    d="M 23.5 11.5 A 8.5 8.5 0 0 0 9.5 14.5"
    fill="none"
    stroke="#5ee0d9"
    stroke-width="2.25"
    stroke-linecap="round"
  />
  <path d="M 8.2 14.8 L 11.4 11.6 L 11.4 18.2 Z" fill="#5ee0d9" />
</svg>
