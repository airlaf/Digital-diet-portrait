<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital diet portrait</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }
      body.portrait-mode {
        overflow: hidden;
      }
      body.portrait-mode canvas {
        display: block;
      }
      .landing {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        z-index: 2;
      }
      .landing-inner {
        text-align: center;
        padding: 24px;
        max-width: 420px;
      }
      .landing-inner p {
        font-family: "Geist Mono", monospace;
        font-size: 13px;
        color: #9a9690;
        line-height: 1.5;
        margin: 0 0 28px;
      }
      .landing-inner button {
        font-family: "Geist Mono", monospace;
        font-size: 13px;
        letter-spacing: 0.04em;
        padding: 14px 22px;
        border: 1px solid #2a2926;
        background: transparent;
        color: #e8e6e3;
        cursor: pointer;
      }
      .landing-inner button:hover {
        color: #c9a227;
        border-color: #c9a227;
      }
    </style>
  </head>
  <body>
    <div id="landing" class="landing">
      <div class="landing-inner">
        <p>Word tiles sample the stretched, mirrored feed; text sits inset inside each tile with a light border. Use http://localhost (not file://).</p>
        <button type="button" id="start-camera">Start camera</button>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
